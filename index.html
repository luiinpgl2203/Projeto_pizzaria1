<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pizzaria Funchal - Plataforma de Gestão</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'brand-orange': '#FF7300',
              'brand-red': '#EA1D2C',
              'brand-lime': '#A2FF00',
              'p-d-olive': '#5C5246',
              'p-taupe': '#8A817C',
              'whatsapp-bg': '#e5ddd5',
              'whatsapp-outgoing': '#dcf8c6',
            },
            keyframes: {
              slideInRight: {
                '0%': { transform: 'translateX(100%)', opacity: '0' },
                '100%': { transform: 'translateX(0)', opacity: '1' },
              },
              'pulse-bg': {
                '0%, 100%': { backgroundColor: 'rgba(239, 246, 255, 1)' },
                '50%': { backgroundColor: 'rgba(219, 234, 254, 1)' },
              },
              ping: {
                '75%, 100%': {
                  transform: 'scale(2)',
                  opacity: '0'
                }
              },
            },
            animation: {
              'slide-in-right': 'slideInRight 0.5s ease-out forwards',
              'pulse-bg': 'pulse-bg 2.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              ping: 'ping 1s cubic-bezier(0, 0, 0.2, 1) infinite',
            }
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Poppins', sans-serif;
      }
      .chat-bg-pattern {
        background-color: #e5ddd5;
        background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23d8d2c9' fill-opacity='0.4' fill-rule='evenodd'%3E%3Cpath d='M0 40L40 0H20L0 20M40 40V20L20 40'/%3E%3C/g%3E%3C/svg%3E");
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
